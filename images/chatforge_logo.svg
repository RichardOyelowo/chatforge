<svg viewBox="0 0 1800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="forgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ffb703"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1800" height="420" fill="#05070a"/>

  <!-- Main logo -->
  <g transform="translate(40,260)">

    <!-- WIDER Icon -->
    <g transform="translate(0,-160)">
      <rect width="360" height="180" rx="28" fill="#0b1220" stroke="#1f2937"/>

      <text x="80" y="110" font-family="JetBrains Mono, monospace" font-size="64" fill="#f59e0b">&gt;</text>

      <rect x="170" y="90" width="36" height="8" fill="#f59e0b">
        <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>

      <g filter="url(#glow)">
        <circle cx="220" cy="130" r="10" fill="#f59e0b">
          <animate attributeName="cy" values="130;100;130" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="270" cy="140" r="12" fill="#ffb703">
          <animate attributeName="cy" values="140;105;140" dur="2.2s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- Text pushed further right for more spacing -->
    <text x="420" y="0"
          font-family="Inter, sans-serif"
          font-size="220"
          font-weight="600"
          letter-spacing="4">
      <tspan fill="#9ca3af">chat</tspan><tspan fill="url(#forgeGradient)">forge</tspan>
    </text>

  </g>

  <!-- Subtitle -->
  <text x="900" y="380"
        text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="36"
        fill="#6b7280"
        letter-spacing="12">
    NEOVIM · AI · PLUGIN
  </text>

</svg>